<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>固定URL番号抽選</title>
<style>
body{
  font-family:sans-serif;
  background:#f4f6fb;
  max-width:900px;
  margin:auto;
  padding:20px;
}
.box{
  background:#fff;
  border-radius:14px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}
h1,h2{text-align:center;}
textarea,input{
  width:100%;
  padding:10px;
  font-size:16px;
  margin-top:10px;
  box-sizing:border-box;
}
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}
.main{background:#5865F2;color:#fff;}
.result{
  font-size:32px;
  font-weight:bold;
  text-align:center;
  margin-top:20px;
}
.small{font-size:13px;color:#666;}
.hidden{display:none;}
.row{
  border-bottom:1px solid #eee;
  padding:10px 0;
  word-break:break-all;
}
</style>
</head>
<body>

<h1>固定URL番号抽選</h1>

<div class="box">
  <h2>参加者ページ</h2>
  <div class="result" id="userResult">読み込み中...</div>
</div>

<div class="box hidden" id="adminBox">
  <h2>管理者画面</h2>
  <textarea id="names" rows="10" placeholder="1行に1人ずつ入力&#10;Jack&#10;Tom&#10;Yuki"></textarea>
  <button class="main" onclick="makeData()">抽選して data.json を作成</button>
  <div id="output" class="small"></div>
</div>

<script>
const params = new URLSearchParams(location.search);

if(params.get("admin")==="1234"){
  document.getElementById("adminBox").classList.remove("hidden");
}

if(params.get("user")){
  loadUser(params.get("user"));
}else{
  document.getElementById("userResult").innerHTML =
    "管理者から送られたURLを開いてください";
}

async function loadUser(name){
  try{
    const res = await fetch("data.json?" + Date.now());
    const data = await res.json();

    if(data[name] !== undefined){
      document.getElementById("userResult").innerHTML =
        name + " さんの番号は<br>" + data[name];
    }else{
      document.getElementById("userResult").innerHTML =
        "まだ抽選されていません";
    }
  }catch(e){
    document.getElementById("userResult").innerHTML =
      "data.json がありません";
  }
}

function makeData(){
  const text = document.getElementById("names").value.trim();

  if(!text){
    alert("名前を入力してください");
    return;
  }

  const names = text.split("\n").map(v=>v.trim()).filter(v=>v);

  let nums = [];
  for(let i=1;i<=100;i++) nums.push(i);

  let data = {};

  names.forEach(name=>{
    let r = Math.floor(Math.random()*nums.length);
    data[name] = nums[r];
    nums.splice(r,1);
  });

  let json = JSON.stringify(data, null, 2);

  let html = "この内容を data.json に貼り付けてください。<br><br>";
  html += "<pre>" + json + "</pre>";

  for(let name in data){
    html += "<div class='row'>" +
      name + "<br>" +
      location.origin + location.pathname + "?user=" + encodeURIComponent(name) +
      "</div>";
  }

  document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
